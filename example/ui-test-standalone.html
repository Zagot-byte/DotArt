  drawText(grid, 32, 5, 'ascii grid engine', { fg: '#666' })
  drawText(grid, 32, 13, 'hover the boxes', { fg: '#888' })

  mounted.update()

  mounted.on('hover', 30, 2, 28, 7, () => {
    clearRegion(grid, 30, 2, 28, 7)
    drawBox(grid, 30, 2, 28, 7, { border: 'heavy', fg: '#facc15' })
    drawText(grid, 32, 4, 'dotart ui', { fg: '#facc15' })
    drawText(grid, 32, 5, 'ascii grid engine', { fg: '#888' })

    drawText(grid, 32, 5, 'ascii grid engine', { fg: '#666' })
